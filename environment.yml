# Conda environment spec untuk replikasi penuh lingkungan eksperimen skripsi
# "Strategi Dekomposisi Pipeline Berbasis Konversi Modalitas Menggunakan
#  Gemma-3 dan RoBERTa" (Gultom, 2026).
#
# Lingkungan referensi:
#   - OS       : Windows 11 Home Single Language 25H2 (x86_64)
#   - Conda    : 25.9.1
#   - Python   : 3.10.19
#   - GPU      : Intel Arc Graphics (Core Ultra 7 155H) via PyTorch XPU backend
#
# Cara pakai:
#   conda env create -f environment.yml
#   conda activate skripsi-aes
#
# Catatan:
#   - PyTorch 2.10.0+xpu di-install via pip karena wheel resmi belum tersedia
#     di channel conda Intel pada saat penelitian dilakukan.
#   - Pengguna non-Intel (NVIDIA / CPU only) dapat mengganti torch==2.10.0+xpu
#     dengan torch==2.10.0 biasa; sisa pipeline tidak terpengaruh.

name: skripsi-aes

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10.19
  - pip
  - pip:
      # Deep learning & transformer
      - torch==2.10.0
      - transformers==5.0.1.dev0

      # Multimodal LLM API
      - google-generativeai==0.8.6

      # Data & komputasi numerik
      - pandas==2.3.3
      - numpy==2.2.6
      - scikit-learn==1.7.2
      - scipy==1.15.3

      # Evaluasi keselarasan semantik
      - bert-score==0.3.13

      # I/O gambar & utilitas
      - pillow==12.0.0
      - tqdm==4.67.1
      - matplotlib==3.10.8
      - tabulate==0.10.0

      # Notebook runtime
      - ipykernel==7.2.0
